version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: dshop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: dshop
      MYSQL_USER: dshop
      MYSQL_PASSWORD: dshop
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - dshop-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # WordPress
  wordpress:
    image: wordpress:latest
    container_name: dshop-wordpress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: dshop
      WORDPRESS_DB_PASSWORD: dshop
      WORDPRESS_DB_NAME: dshop
      WORDPRESS_DEBUG: 1
    ports:
      - "8080:80"
    volumes:
      - wordpress_data:/var/www/html
      - ./plugins/dshop:/var/www/html/wp-content/plugins/dshop
    networks:
      - dshop-network

  # PHPMyAdmin (optional)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: dshop-phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "8081:80"
    networks:
      - dshop-network

volumes:
  db_data:
  wordpress_data:

networks:
  dshop-network:
    driver: bridge
